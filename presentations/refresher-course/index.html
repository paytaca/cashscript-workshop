<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CashScript Refresher Course</title>
    <link rel="stylesheet" href="/node_modules/reveal.js/dist/reveal.css">
    <link rel="stylesheet" href="/node_modules/reveal.js/dist/theme/league.css">
    <link rel="stylesheet" href="/node_modules/reveal.js/plugin/highlight/monokai.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="reveal">
        <div class="slides">
            <section>
                <div>
                    <h1 class="flex items-center justify-center gap-3 mb-4">
                        <p>
                            <span class="text-green-600">CashScript</span><br/>
                            <span>Refresher Course</span>
                        </p>
                    </h1>
                    <p class="text-3xl">
                        Cash 3.0 Hackathon
                    </p>
                </div>
            </section>

            <section>
                <h2 class="text-4xl mb-6">Contents</h2>
                <ul class="text-3xl space-y-4 text-left">
                    <li class="flex items-center gap-3">
                        <span class="w-3 h-3 bg-blue-500 rounded-full"></span>
                        BCH Wallet Basics and Transaction Structure
                    </li>
                    <li class="flex items-center gap-3">
                        <span class="w-3 h-3 bg-blue-500 rounded-full"></span>
                        CashScript Coding Proper
                    </li>
                    <li class="flex items-center gap-3">
                        <span class="w-3 h-3 bg-blue-500 rounded-full"></span>
                        JavaScript Integration
                    </li>
                </ul>
            </section>
        </div>
    </div>

    <script src="/node_modules/reveal.js/dist/reveal.js"></script>
    <script src="/node_modules/reveal.js/plugin/highlight/highlight.js"></script>
    <script>
        Reveal.initialize({
            hash: true,
            transition: 'fade',
            plugins: [RevealHighlight]
        });
    </script>
</body>
